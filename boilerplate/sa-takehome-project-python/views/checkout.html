{% extends 'layouts/main.html' %} {% block content %}
<div class="row justify-content-md-center">
  <div class="col-6">
    <div class="text-center mt-40">
      <h1>Checkout — Stripe Press</h1>
      <h5 class="text-secondary">{{ title }}</h5>
      <hr class="mt-40" />
      <div class="mt-20 text-info">
        Total due: $<span class="amount" data-amount="{{ amount }}"></span>
      </div>
    </div>
    <div class="card box-shadow mt-40">
      <div class="card-body">
        <form id="payment-form">
          <div id="payment-element"></div>
          <div id="error-message" class="text-danger mt-20"></div>
          <div class="mt-20">
            <button id="submit" type="submit" class="btn btn-lg btn-block btn-primary">
              Pay $<span class="amount" data-amount="{{ amount }}"></span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script>
  const stripe = Stripe("{{ publishable_key }}");
  let elements;

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      const response = await fetch("/create-payment-intent", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ item: "{{ request.args.get('item') }}" }),
      });

      if (!response.ok) {
        throw new Error("Could not initialise payment.");
      }

      const { clientSecret } = await response.json();

      elements = stripe.elements({ clientSecret });
      elements.create("payment").mount("#payment-element");
    } catch (err) {
      document.getElementById("error-message").textContent = err.message;
    }
  });

  document.getElementById("payment-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const { error } = await stripe.confirmPayment({
      elements,
      confirmParams: {
        return_url: window.location.origin + "/success",
      },
    });

    if (error) {
      document.getElementById("error-message").textContent = error.message;
    }
  });
</script>
{% endblock %}
